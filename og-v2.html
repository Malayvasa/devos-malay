<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden}
.og{width:1200px;height:630px;position:relative;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.copy{position:absolute;top:40px;right:56px;text-align:right;font-size:52px;font-weight:600;line-height:1.2;letter-spacing:-0.02em;max-width:720px;color:#1a1a1a}
.bar{position:absolute;opacity:0.85}
.b1{left:-5%;width:60%;height:45%;bottom:10%}.b2{left:25%;width:55%;height:35%;bottom:25%;opacity:.7}
.b3{left:40%;width:50%;height:50%;bottom:-5%}.b4{left:10%;width:40%;height:25%;bottom:40%;opacity:.6}
.b5{left:55%;width:45%;height:30%;bottom:15%;opacity:.75}.b6{left:15%;width:35%;height:20%;bottom:55%;opacity:.5}
.glitch{position:absolute;bottom:0;left:0;right:0;height:340px;overflow:hidden}
.og{background:#FAF8FF}.b1{background:#7C3AED}.b2{background:#A78BFA}.b3{background:#4338CA}.b4{background:#C4B5FD}.b5{background:#6D28D9}.b6{background:#EDE9FE}
</style></head><body><div class="og">
<div class="copy">Your agent calls the shots.<br>We make them happen.</div>
<div class="glitch"><div class="bar b1"></div><div class="bar b2"></div><div class="bar b3"></div><div class="bar b4"></div><div class="bar b5"></div><div class="bar b6"></div></div>
</div></body></html>
